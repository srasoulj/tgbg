{{ define "layout" -}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telegram in Background</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050816;
            --bg-elevated: rgba(15, 23, 42, 0.9);
            --bg-elevated-soft: rgba(15, 23, 42, 0.75);
            --border-subtle: rgba(148, 163, 184, 0.25);
            --accent: #22d3ee;
            --accent-soft: rgba(56, 189, 248, 0.4);
            --accent-strong: #0ea5e9;
            --accent-warm: #f97316;
            --text-primary: #e5e7eb;
            --text-muted: #9ca3af;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-pill: 999px;
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.8);
            --transition-fast: 180ms ease-out;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Public Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(circle at 0% 0%, rgba(248, 113, 113, 0.18), transparent 55%),
                radial-gradient(circle at 100% 0%, rgba(56, 189, 248, 0.22), transparent 55%),
                radial-gradient(circle at 0% 100%, rgba(45, 212, 191, 0.16), transparent 55%),
                #020617;
            background-attachment: fixed;
        }

        .app-shell {
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-frame {
            width: min(1180px, 100%);
            height: min(720px, 100vh - 3rem);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.92));
            border-radius: 26px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        header {
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(148, 163, 184, 0.35);
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 60%);
        }

        header-left {
            display: flex;
            align-items: center;
            gap: 0.9rem;
        }

        .brand-mark {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: radial-gradient(circle at 30% 20%, #ffffff, #e0f2fe 55%, #38bdf8 100%);
            box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.7), 0 10px 26px rgba(8, 47, 73, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brand-mark::before {
            /* Simple paper-plane glyph reminiscent of Telegram */
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            background: white;
            clip-path: polygon(10% 60%, 90% 15%, 60% 55%, 55% 80%, 47% 62%);
            transform: translateX(1px) translateY(-1px) rotate(10deg);
            box-shadow: 0 1px 4px rgba(15, 23, 42, 0.25);
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .header-title {
            font-family: "Sora", system-ui, sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .header-badge {
            padding: 0.3rem 0.9rem;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.2), transparent 55%);
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .header-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.18);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 0;
            overflow: hidden;
        }

        nav {
            padding: 1rem 1.1rem;
            border-right: 1px solid rgba(148, 163, 184, 0.3);
            background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.96));
            display: flex;
            flex-direction: column;
        }

        nav h2 {
            font-family: "Sora", system-ui, sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 0 0 0.75rem 0;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            overflow-y: auto;
        }

        nav li {
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        nav a {
            display: flex;
            flex-direction: column;
            padding: 0.55rem 0.7rem;
            gap: 0.1rem;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            border-radius: inherit;
            border: 1px solid transparent;
            background: transparent;
            transition: background var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast), color var(--transition-fast);
        }

        nav a span.channel-username {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        nav a:hover {
            background: radial-gradient(circle at 0 0, rgba(34, 211, 238, 0.2), transparent 70%);
            border-color: rgba(56, 189, 248, 0.6);
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(8, 47, 73, 0.7);
        }

        nav a.active {
            background: radial-gradient(circle at 0 0, rgba(34, 211, 238, 0.2), transparent 70%);
            border-color: rgba(56, 189, 248, 0.8);
            box-shadow: 0 10px 30px rgba(8, 47, 73, 0.85);
        }

        section.content {
            padding: 1.3rem 1.5rem 1.7rem 1.5rem;
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.22), transparent 60%), radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.2), transparent 65%), #020617;
            position: relative;
            overflow-y: auto;
        }

        .content-inner {
            max-width: 760px;
            margin: 0 auto;
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 0.9rem;
            padding-top: 2rem;
        }

        .channel-header {
            margin-bottom: 1rem;
        }

        .channel-title {
            font-family: "Sora", system-ui, sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .channel-pill {
            padding: 0.1rem 0.6rem;
            border-radius: var(--radius-pill);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.6);
            color: var(--text-muted);
        }

        .channel-username {
            margin-top: 0.3rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .message {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.9));
            border-radius: var(--radius-lg);
            padding: 0.85rem 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.9);
            position: relative;
            overflow: hidden;
        }

        .message::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 0 0, rgba(34, 211, 238, 0.18), transparent 65%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .message:hover::before {
            opacity: 1;
        }

        .message-inner {
            position: relative;
            z-index: 1;
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .message-id {
            font-family: "Sora", system-ui, sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: rgba(148, 163, 184, 0.8);
        }

        .message-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .message a {
            color: var(--accent-soft);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .message a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .pagination {
            margin-top: 1.1rem;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            color: var(--text-muted);
        }

        .pagination-links {
            display: flex;
            gap: 0.45rem;
        }

        .pagination a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(148, 163, 184, 0.6);
            color: var(--text-primary);
            text-decoration: none;
            background: rgba(15, 23, 42, 0.9);
            transition: background var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast);
        }

        .pagination a:hover {
            background: var(--accent-soft);
            border-color: var(--accent-strong);
            transform: translateY(-1px);
        }

        @media (max-width: 900px) {
            .app-frame {
                height: auto;
            }
            main {
                grid-template-columns: minmax(0, 1fr);
            }
            nav {
                border-right: none;
                border-bottom: 1px solid rgba(148, 163, 184, 0.3);
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="app-frame">
        <header>
            <div class="header-left">
                <div class="brand-mark">
                    <span>TG</span>
                </div>
                <div class="header-text">
                    <div class="header-title">Telegram in Background</div>
                    <div class="header-subtitle">Local Telegram sync · Read-only viewer</div>
                </div>
            </div>
            <div class="header-badge">
                <span class="header-dot"></span>
                Synced via desktop app
            </div>
        </header>
        <main>
            <nav>
                <h2>Channels</h2>
                {{ template "channels_nav" . }}
            </nav>
            <section class="content">
                <div class="content-inner">
                    {{ template "content" . }}
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
{{- end }}
